name: Content Retention

on:
  schedule:
    # Every Sunday at 06:15 UTC
    - cron: "15 6 * * 0"
  workflow_dispatch:

jobs:
  retention:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: content-retention
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run content retention (apply)
        run: npm run content:retention:apply
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
